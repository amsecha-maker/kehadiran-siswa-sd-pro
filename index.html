<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sistem Kehadiran Siswa SD</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="print.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">
  <div class="login-box">
    <h2>📘 Login Sistem Kehadiran</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🏫 Absensi SD</h2>

    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('siswa')">Data Siswa</button>
    <button onclick="showPage('kehadiran')">Kehadiran</button>
    <button onclick="showPage('rekap')">Rekap</button>

    <hr>

    <button onclick="exportBackup()">Backup</button>
    <button onclick="logout()">Logout</button>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- DASHBOARD -->
    <section id="dashboard" class="page active">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <h3>Total Siswa</h3>
          <p id="totalSiswa">0</p>
        </div>

        <div class="card">
          <h3>Persentase Hadir</h3>
          <p id="persentase">0%</p>
        </div>
      </div>

      <canvas id="chart"></canvas>
    </section>

    <!-- DATA SISWA -->
    <section id="siswa" class="page">
      <h1>Data Siswa</h1>

      <div class="form-grid">
        <input id="nama" placeholder="Nama Siswa">
        <input id="nisn" placeholder="NISN">
        <input id="kelas" placeholder="Kelas (3A)">
        <input id="ortu" placeholder="Nama Orang Tua">
        <input id="wa" placeholder="62xxxxxxxx">
        <button onclick="tambahSiswa()">Tambah</button>
      </div>

      <table id="tabelSiswa"></table>
    </section>

    <!-- KEHADIRAN -->
    <section id="kehadiran" class="page">
      <h1>Kehadiran Bulanan</h1>
      <div id="tabelKehadiran"></div>
    </section>

    <!-- REKAP -->
    <section id="rekap" class="page">
      <h1>Rekap Bulanan</h1>
      <div id="rekapTable"></div>

      <button class="btn" onclick="window.print()">
        🖨️ Cetak Rekap
      </button>
    </section>

  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script src="js/siswa.js"></script>
<script src="js/attendance.js"></script>
<script src="js/export.js"></script>

</body>
</html>
